@if (isLoggedIn()) {
  <app-responsive-navigation [items]="navItems">
    <div right-side>
      <app-theme-toggle></app-theme-toggle>
    </div>
  </app-responsive-navigation>
}

<main
  [class.min-h-screen]="!isLoggedIn()"
  [class.min-h-[calc(100vh-64px)]]="isLoggedIn()"
  class="bg-gray-50 dark:bg-gray-950 p-4 sm:p-6 lg:p-8 flex flex-col"
>
  <app-responsive-container class="flex-1 flex flex-col">
    <router-outlet></router-outlet>
  </app-responsive-container>
</main>
