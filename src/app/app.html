@if (isLoggedIn()) {
  <app-responsive-navigation [items]="navItems" [userName]="userName()">
  </app-responsive-navigation>
}

<div
  class="min-h-screen transition-all duration-300 flex flex-col bg-gray-50 dark:bg-gray-950"
  [class.main-content-shifted]="isLoggedIn() && isMenuOpen() && !isMobile()"
>
  @if (isLoggedIn()) {
    <header
      class="sticky top-0 h-16 z-30 flex items-center justify-between px-4 sm:px-6 lg:px-8 bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 w-full"
    >
      <!-- Left side: Menu Toggle with Logo -->
      <div class="flex items-center min-w-[40px]">
        @if (isMobile() || !isMenuOpen()) {
          <button
            (click)="layoutService.toggleMenu()"
            class="flex items-center gap-2 p-1.5 pr-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors group"
            aria-label="Abrir menú"
          >
            <div
              class="p-1 bg-gray-50 dark:bg-gray-800 rounded-md group-hover:bg-white dark:group-hover:bg-gray-700 transition-colors"
            >
              <svg
                class="h-5 w-5 text-gray-500"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
            </div>
            <img src="logo.svg" alt="Logo" class="w-6 h-6 rounded-md" />
          </button>
        }
      </div>

      <!-- Right side: User Info Box -->
      <div
        class="flex items-center gap-4 bg-gray-50 dark:bg-gray-900 px-4 py-1.5 rounded-xl border border-gray-100 dark:border-gray-800 shadow-sm"
      >
        <span class="text-sm font-semibold text-gray-700 dark:text-gray-200">{{ userName() }}</span>
        <app-theme-toggle></app-theme-toggle>
      </div>
    </header>
  }

  <main class="flex-1 p-4 sm:p-6 lg:p-8">
    <app-responsive-container class="flex-1 flex flex-col">
      <router-outlet></router-outlet>
    </app-responsive-container>
  </main>
</div>
