<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-fade-in"
>
  <div
    class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-2xl w-full max-w-md overflow-hidden animate-scale-in"
  >
    <div
      class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between bg-gray-50/50 dark:bg-gray-800/20"
    >
      <h2 class="text-lg font-bold text-gray-900 dark:text-white">
        {{ user ? 'Editar Usuario' : 'Nuevo Usuario' }}
      </h2>
      <button
        (click)="close()"
        class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors"
      >
        ✕
      </button>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      @if (errorMessage()) {
        <div
          class="p-3 bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900/30 rounded-xl text-red-600 dark:text-red-400 text-xs"
        >
          {{ errorMessage() }}
        </div>
      }

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Nombre</label>
          <input
            formControlName="nombre"
            type="text"
            placeholder="Ej: Juan"
            class="w-full px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white text-sm"
          />
        </div>
        <div class="space-y-1">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider"
            >Apellido</label
          >
          <input
            formControlName="apellido"
            type="text"
            placeholder="Ej: Pérez"
            class="w-full px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white text-sm"
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Usuario</label>
        <input
          formControlName="username"
          type="text"
          placeholder="nombre_usuario"
          class="w-full px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white text-sm"
        />
      </div>

      <div class="space-y-1">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider"
          >Correo Electrónico</label
        >
        <input
          formControlName="email"
          type="email"
          placeholder="usuario@ejemplo.com"
          class="w-full px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white text-sm"
        />
      </div>

      <div class="space-y-1">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider"
          >Rol de Usuario</label
        >
        <select
          formControlName="rol_id"
          class="w-full px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white text-sm"
        >
          <option [ngValue]="null" disabled>Seleccionar Rol</option>
          @for (rol of roles(); track rol.id) {
            <option [value]="rol.id">{{ rol.nombre }}</option>
          }
        </select>
      </div>

      <div class="space-y-1">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Teléfono</label>
        <input
          formControlName="telefono"
          type="text"
          placeholder="099 999 999"
          class="w-full px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white text-sm"
        />
      </div>

      <div class="space-y-1">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider"
          >Contraseña {{ user ? '(Opcional)' : '' }}</label
        >
        <input
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white text-sm"
        />
      </div>

      <div class="pt-4 flex gap-3">
        <button
          type="button"
          (click)="close()"
          class="flex-1 px-4 py-2 border border-gray-100 dark:border-gray-800 text-gray-600 dark:text-gray-400 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium text-sm"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="isSubmitting() || userForm.invalid"
          class="flex-1 px-4 py-2 bg-primary text-white rounded-xl hover:bg-primary/90 transition-all shadow-sm shadow-primary/20 font-medium text-sm flex items-center justify-center gap-2 disabled:opacity-50"
        >
          @if (isSubmitting()) {
            <div
              class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"
            ></div>
          }
          {{ user ? 'Guardar Cambios' : 'Crear Usuario' }}
        </button>
      </div>
    </form>
  </div>
</div>
