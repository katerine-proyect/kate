<header
  class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <div class="flex-shrink-0 flex items-center">
        <!--<span class="text-2xl font-bold text-blue-600 dark:text-blue-400">Kate</span>-->
      </div>

      <!-- Desktop Menu -->
      <nav class="hidden md:flex space-x-8">
        @for (item of items; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-400"
            class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 px-1 pt-1 text-sm font-medium transition-colors"
          >
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="flex items-center space-x-4">
        <ng-content select="[right-side]"></ng-content>

        <!-- Mobile Menu Button -->
        <button
          (click)="toggleMenu()"
          class="md:hidden inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500"
          [attr.aria-expanded]="isMenuOpen()"
          aria-label="Toggle navigation menu"
        >
          @if (isMenuOpen()) {
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          } @else {
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    class="md:hidden overflow-hidden transition-all duration-300 ease-in-out"
    [class.max-h-0]="!isMenuOpen()"
    [class.max-h-96]="isMenuOpen()"
    [class.opacity-0]="!isMenuOpen()"
    [class.opacity-100]="isMenuOpen()"
  >
    <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white dark:bg-gray-900 shadow-lg">
      @for (item of items; track item.route) {
        <a
          [routerLink]="item.route"
          (click)="closeMenu()"
          routerLinkActive="bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400"
          class="text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 block px-3 py-2 rounded-md text-base font-medium transition-colors"
        >
          {{ item.label }}
        </a>
      }
    </div>
  </div>
</header>
