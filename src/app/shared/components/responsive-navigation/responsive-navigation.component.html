<aside class="sidebar" [class.sidebar-open]="isMenuOpen()">
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <div class="flex items-center justify-between gap-3 w-full">
      <div class="flex items-center gap-3">
        <img src="logo.svg" alt="Kate Logo" class="w-8 h-8 rounded-lg shadow-sm" />
        <span class="sidebar-brand text-xl font-bold">Kate</span>
      </div>

      <button
        (click)="toggleMenu()"
        class="text-gray-400 hover:text-gray-600 transition-colors p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md"
        [aria-label]="isMenuOpen() ? 'Cerrar menú' : 'Abrir menú'"
      >
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            [attr.d]="isMobile() ? 'M6 18L18 6M6 6l12 12' : 'M11 19l-7-7 7-7m8 14l-7-7 7-7'"
          />
        </svg>
      </button>
    </div>
  </div>

  <!-- Identidad de Usuario en Sidebar (Opcional, ya que está en el header, pero ayuda en móvil) -->
  <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800 flex items-center gap-3">
    <div
      class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white text-xs font-bold shadow-sm"
    >
      {{ userName.charAt(0).toUpperCase() }}
    </div>
    <span class="text-sm font-medium text-gray-700 dark:text-gray-200">{{ userName }}</span>
  </div>

  <!-- Navigation Links -->
  <nav class="sidebar-nav">
    @for (item of items; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="sidebar-link-active"
        (click)="isMobile() ? closeMenu() : null"
        class="sidebar-link"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Sidebar Footer -->
  <div class="sidebar-footer">
    <ng-content select="[right-side]"></ng-content>
  </div>
</aside>

<!-- Mobile Overlay -->
@if (isMobile() && isMenuOpen()) {
  <div class="sidebar-overlay" (click)="closeMenu()"></div>
}
